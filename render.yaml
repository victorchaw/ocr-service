services:
  - type: web
    name: ocr-receipt-service
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: LLAMAPARSE_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MAX_FILE_SIZE
        value: "10485760"
